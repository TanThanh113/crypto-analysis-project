name: Cleanup PR Preview Images

on:
  pull_request:
    types:
      - closed

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_LOCATION }}
  ARTIFACT_REPO: crypto-docker

jobs:
  cleanup-preview-images:
    name: Delete PR preview Docker images
    runs-on: ubuntu-latest

    # Only cleanup PRs from this repository, not forks.
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate GCP repository variables
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required GitHub repository variable: GCP_PROJECT_ID"
            exit 1
          fi

          if [ -z "${REGION:-}" ]; then
            echo "Missing required GitHub repository variable: GCP_LOCATION"
            exit 1
          fi

          REGISTRY_HOST="${REGION}-docker.pkg.dev"
          IMAGE_BASE="${REGISTRY_HOST}/${PROJECT_ID}/${ARTIFACT_REPO}"

          if [ "${IMAGE_BASE}" = "-docker.pkg.dev//${ARTIFACT_REPO}" ]; then
            echo "Invalid Artifact Registry image base: ${IMAGE_BASE}"
            exit 1
          fi

          echo "REGISTRY_HOST=${REGISTRY_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_BASE=${IMAGE_BASE}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete PR preview image tags
        shell: bash
        run: |
          set -euo pipefail

          PR_TAG="pr-${{ github.event.pull_request.number }}"

          echo "Cleaning preview images for tag: ${PR_TAG}"

          for IMAGE in crypto-batch crypto-dbt crypto-ml; do
            IMAGE_REF="${IMAGE_BASE}/${IMAGE}:${PR_TAG}"
            echo "Deleting ${IMAGE_REF} if it exists..."

            gcloud artifacts docker images delete "${IMAGE_REF}" \
              --project="${PROJECT_ID}" \
              --quiet \
              --delete-tags || true
          done

          echo "Preview image cleanup completed."
