name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "local_scripts/**"
      - "dbt_transform/**"
      - "ml/**"
      - "docker/**"
      - ".github/workflows/docker-build-push.yml"
  pull_request:
    branches:
      - main
    paths:
      - "local_scripts/**"
      - "dbt_transform/**"
      - "ml/**"
      - "docker/**"
      - ".github/workflows/docker-build-push.yml"
  workflow_dispatch:

env:
  PROJECT_ID: project-lambda-crypto
  REGION: asia-southeast1
  ARTIFACT_REPO: crypto-docker
  IMAGE_BASE: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            batch:
              - 'local_scripts/**'
              - 'docker/batch.Dockerfile'
              - '.github/workflows/docker-build-push.yml'
            dbt:
              - 'dbt_transform/**'
              - 'docker/dbt.Dockerfile'
              - '.github/workflows/docker-build-push.yml'
            ml:
              - 'ml/**'
              - 'docker/ml.Dockerfile'
              - '.github/workflows/docker-build-push.yml'

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # --- BATCH COMPONENT ---
      - name: Build batch image
        if: steps.filter.outputs.batch == 'true'
        run: |
          docker build \
            -t ${IMAGE_BASE}/crypto-batch:${{ github.sha }} \
            -t ${IMAGE_BASE}/crypto-batch:latest \
            -f docker/batch.Dockerfile \
            local_scripts

      - name: Smoke test batch image
        if: steps.filter.outputs.batch == 'true'
        run: |
          docker run --rm ${IMAGE_BASE}/crypto-batch:${{ github.sha }} python --version

      - name: Push batch image
        if: steps.filter.outputs.batch == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE_BASE}/crypto-batch:${{ github.sha }}
          docker push ${IMAGE_BASE}/crypto-batch:latest

      # --- DBT COMPONENT ---
      - name: Build dbt image
        if: steps.filter.outputs.dbt == 'true'
        run: |
          docker build \
            -t ${IMAGE_BASE}/crypto-dbt:${{ github.sha }} \
            -t ${IMAGE_BASE}/crypto-dbt:latest \
            -f docker/dbt.Dockerfile \
            dbt_transform

      - name: Smoke test dbt image
        if: steps.filter.outputs.dbt == 'true'
        run: |
          docker run --rm ${IMAGE_BASE}/crypto-dbt:${{ github.sha }} uv run dbt --version

      - name: Push dbt image
        if: steps.filter.outputs.dbt == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE_BASE}/crypto-dbt:${{ github.sha }}
          docker push ${IMAGE_BASE}/crypto-dbt:latest

      # --- ML COMPONENT ---
      - name: Build ML image
        if: steps.filter.outputs.ml == 'true'
        run: |
          docker build \
            -t ${IMAGE_BASE}/crypto-ml:${{ github.sha }} \
            -t ${IMAGE_BASE}/crypto-ml:latest \
            -f docker/ml.Dockerfile \
            ml

      - name: Smoke test ML image
        if: steps.filter.outputs.ml == 'true'
        run: |
          docker run --rm ${IMAGE_BASE}/crypto-ml:${{ github.sha }} python --version

      - name: Push ML image
        if: steps.filter.outputs.ml == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE_BASE}/crypto-ml:${{ github.sha }}
          docker push ${IMAGE_BASE}/crypto-ml:latest