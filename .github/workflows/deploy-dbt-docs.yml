name: Deploy dbt Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'dbt_transform/**'
      - '.github/workflows/deploy-dbt-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-lineage:
    name: Build and Deploy Data Lineage
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv package manager
        uses: astral-sh/setup-uv@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Generate dbt Documentation
        working-directory: dbt_transform
        env:
          GCP_PROJECT_ID: project-lambda-crypto
          BQ_ANALYTICS_DATASET: dbt_quants_dev
          BQ_LOCATION: asia-southeast1
        run: |
          uv sync --locked
          cd crypto_dbt
          uv run dbt deps
          uv run dbt docs generate

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dbt static assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dbt_transform/crypto_dbt/target'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
