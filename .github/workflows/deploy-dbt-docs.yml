name: Deploy Project Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "dbt_transform/**"
      - ".github/workflows/deploy-dbt-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "project-docs-pages"
  cancel-in-progress: false

jobs:
  deploy-project-docs:
    name: Build and deploy project docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r docs/requirements-docs.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Generate dbt documentation
        working-directory: dbt_transform
        env:
          DBT_TARGET: gke
          GCP_PROJECT_ID: project-lambda-crypto
          BQ_ANALYTICS_DATASET: dbt_quants_dev
          BQ_ML_OUTPUTS_DATASET: ml_outputs
          BQ_LOCATION: asia-southeast1
        run: |
          uv sync --locked
          cd crypto_dbt
          uv run dbt deps
          uv run dbt docs generate --no-partial-parse

      - name: Build MkDocs site
        run: |
          rm -rf site
          mkdocs build --strict

      - name: Copy generated dbt docs
        run: |
          mkdir -p site/dbt
          cp -a dbt_transform/crypto_dbt/target/. site/dbt/

      - name: Create root landing page
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Crypto Analytics Project Docs</title>
              <style>
                :root {
                  color-scheme: light;
                  --bg: #f6f8fb;
                  --card: #ffffff;
                  --ink: #142033;
                  --muted: #64748b;
                  --line: #dce4ec;
                  --accent: #0b7f8b;
                }

                * {
                  box-sizing: border-box;
                }

                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  padding: 48px 20px;
                  background:
                    radial-gradient(circle at top left, rgba(11, 127, 139, 0.14), transparent 34rem),
                    linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
                  color: var(--ink);
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }

                main {
                  width: min(1040px, 100%);
                }

                .hero {
                  border: 1px solid var(--line);
                  border-radius: 18px;
                  background: var(--card);
                  padding: clamp(28px, 5vw, 48px);
                  box-shadow: 0 18px 50px rgba(20, 32, 51, 0.08);
                }

                .eyebrow {
                  margin: 0 0 10px;
                  color: var(--accent);
                  font-size: 12px;
                  font-weight: 800;
                  letter-spacing: 0.08em;
                  text-transform: uppercase;
                }

                h1 {
                  margin: 0 0 14px;
                  font-size: clamp(2rem, 5vw, 3.6rem);
                  line-height: 1.02;
                  letter-spacing: 0;
                }

                p {
                  margin: 0;
                  color: var(--muted);
                  font-size: 1.05rem;
                  line-height: 1.7;
                  max-width: 780px;
                }

                .grid {
                  display: grid;
                  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                  gap: 16px;
                  margin-top: 30px;
                }

                a.card {
                  display: block;
                  min-height: 150px;
                  border: 1px solid var(--line);
                  border-radius: 14px;
                  background: #fbfdfe;
                  padding: 22px;
                  color: inherit;
                  text-decoration: none;
                  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
                }

                a.card:hover,
                a.card:focus {
                  transform: translateY(-2px);
                  border-color: rgba(11, 127, 139, 0.35);
                  box-shadow: 0 12px 30px rgba(20, 32, 51, 0.08);
                  outline: none;
                }

                .card strong {
                  display: block;
                  margin-bottom: 8px;
                  font-size: 1.06rem;
                }

                .card span {
                  display: block;
                  color: var(--muted);
                  line-height: 1.55;
                }

                .note {
                  margin-top: 24px;
                  border-top: 1px solid var(--line);
                  padding-top: 18px;
                  font-size: 0.92rem;
                }
              </style>
            </head>
            <body>
              <main>
                <section class="hero">
                  <p class="eyebrow">Crypto Analytics and ML Signal Platform</p>
                  <h1>Project Documentation Hub</h1>
                  <p>
                    Explore the end-to-end platform documentation, interactive project map, and generated dbt lineage docs.
                    This site is documentation-only: no training, deployment, backfill, or cloud writes run from here.
                  </p>

                  <div class="grid">
                    <a class="card" href="./docs/">
                      <strong>Project Documentation Site</strong>
                      <span>MkDocs-rendered guides for architecture, pipelines, dbt layers, ML/MLOps, Kestra, CI/CD, infrastructure, and runbooks.</span>
                    </a>

                    <a class="card" href="./docs/interactive/">
                      <strong>Interactive Project Explorer</strong>
                      <span>Recruiter-friendly guide to Batch, Streaming, dbt, ML/MLOps, Kestra, K8s/GKE, Terraform, CI/CD, and production boundaries.</span>
                    </a>

                    <a class="card" href="./dbt/">
                      <strong>Generated dbt Docs</strong>
                      <span>Generated dbt documentation with model lineage, sources, columns, and transformation metadata.</span>
                    </a>

                    <a class="card" href="https://github.com/TanThanh113/crypto-analysis-project">
                      <strong>GitHub Repository</strong>
                      <span>Source code, workflow definitions, dbt project files, orchestration specs, infrastructure, and reviewer context.</span>
                    </a>
                  </div>

                  <p class="note">
                    This project is an analytics and ML signal platform, not a trading bot.
                  </p>
                </section>
              </main>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload project docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
