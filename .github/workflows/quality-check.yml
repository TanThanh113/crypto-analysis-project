name: Quality Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-check:
    name: Repository quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Basic secret scan
        run: |
          set -e

          PATTERN='BEGIN PRIVATE KEY|AIza[0-9A-Za-z_-]{20,}|ghp_[0-9A-Za-z_]{20,}|sk-[0-9A-Za-z]{20,}|xox[baprs]-[0-9A-Za-z-]{20,}'

          if git ls-files -z \
            | grep -zvE '^docs/runbook\.md$|^\.github/workflows/quality-check\.yml$' \
            | xargs -0 grep -nEI "$PATTERN"; then
            echo "Potential secret detected."
            exit 1
          fi

          echo "No obvious secrets detected."

      - name: Check forbidden committed files
        run: |
          set -e

          WHITELIST=(
            "^terraform/kestra_secrets\.tf$"
            "^k8s/kestra/secret-provider-class-batch\.yml$"
            "^scripts/sync_kestra_k8s_secrets\.sh$"
          )

          WHITELIST_REGEX=$(IFS="|"; echo "${WHITELIST[*]}")

          if git ls-files | grep -vE "$WHITELIST_REGEX" | grep -Ei '\.env|tfstate|tfvars|secret|secrets|key\.json|credential|credentials|joblib|artifacts|output_data|_state|\.success|\.parquet'; then
            echo "Forbidden file pattern detected in git-tracked files."
            exit 1
          fi
          
          echo "No forbidden files detected."

      - name: Validate Kestra YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import yaml

          flow_roots = [
              pathlib.Path("kestra/flows"),
              pathlib.Path("kestra/flows-gke"),
          ]

          paths = []
          for root in flow_roots:
              if root.exists():
                  paths.extend(list(root.rglob("*.yml")))
                  paths.extend(list(root.rglob("*.yaml")))

          if not paths:
              print("No Kestra YAML files found.")
              sys.exit(0)

          failed = False
          for path in paths:
              try:
                  with path.open("r", encoding="utf-8") as f:
                      yaml.safe_load(f)
                  print(f"OK: {path}")
              except Exception as exc:
                  failed = True
                  print(f"ERROR: {path}: {exc}")

          if failed:
              sys.exit(1)
          PY
      
      # Production repository guard
      - name: Production repository guard
        run: |
          python scripts/repo_guard.py

      - name: Python syntax check - repo scripts
        run: |
          python -m compileall scripts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: |
          terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: |
          terraform -chdir=terraform validate

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: dbt parse
        working-directory: dbt_transform
        env:
          GCP_PROJECT_ID: project-lambda-crypto
          BQ_ANALYTICS_DATASET: dbt_quants_dev
          BQ_ML_OUTPUTS_DATASET: ml_outputs
          BQ_LOCATION: asia-southeast1
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/nonexistent-gcp-key.json
        run: |
          uv sync --locked
          cd crypto_dbt
          uv run dbt deps
          uv run dbt parse --no-partial-parse

      - name: Python syntax check - batch
        working-directory: local_scripts
        run: |
          python -m compileall batch

      - name: Python syntax check - ml
        working-directory: ml
        run: |
          python -m pip install -r requirements-dev.txt
          python -m compileall train_model.py predict_latest.py mlflow_utils.py feature_contract.py strategy_config.py time_split.py promotion_gate.py
          pytest tests
