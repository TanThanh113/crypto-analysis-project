name: Deploy Kestra to GKE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_LOCATION }}
  CLUSTER_NAME: crypto-kestra-autopilot
  KESTRA_NAMESPACE: kestra
  KESTRA_SERVER: http://127.0.0.1:8080
  PROD_FLOW_NAMESPACE: crypto.data_engineering

on:
  push:
    branches:
      - main
    paths:
      - "helm/kestra/**"
      - "k8s/kestra/**"
      - "kestra/flows-gke/**"
      - ".github/workflows/kestra-deploy-gke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kestra/flows-gke/**"
      - ".github/workflows/kestra-deploy-gke.yml"
  workflow_dispatch:

jobs:
  deploy-kestra:
    name: Deploy Kestra Helm and flows
    runs-on: ubuntu-latest

    # Never grant cloud credentials to fork PRs.
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate GCP repository variables
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required GitHub repository variable: GCP_PROJECT_ID"
            exit 1
          fi

          if [ -z "${REGION:-}" ]; then
            echo "Missing required GitHub repository variable: GCP_LOCATION"
            exit 1
          fi

          REGISTRY_HOST="${REGION}-docker.pkg.dev"
          IMAGE_BASE="${REGISTRY_HOST}/${PROJECT_ID}/crypto-docker"

          if [ "${IMAGE_BASE}" = "-docker.pkg.dev//crypto-docker" ]; then
            echo "Invalid Artifact Registry image base: ${IMAGE_BASE}"
            exit 1
          fi

          echo "REGISTRY_HOST=${REGISTRY_HOST}" >> "$GITHUB_ENV"
          echo "IMAGE_BASE=${IMAGE_BASE}" >> "$GITHUB_ENV"

      - name: Check for changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            helm_infra:
              - 'helm/kestra/**'
              - 'k8s/kestra/**'
              - '.github/workflows/kestra-deploy-gke.yml'
            kestra_flows:
              - 'kestra/flows-gke/**'
              - '.github/workflows/kestra-deploy-gke.yml'

      - name: Compute deploy metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IMAGE_TAG="pr-${PR_NUMBER}"
            DEPLOY_MODE="preview"
            FLOW_NAMESPACE="crypto.preview.pr_${PR_NUMBER}"
            FLOW_DIR="/tmp/kestra-preview-flows"
          else
            IMAGE_TAG="latest"
            DEPLOY_MODE="production"
            FLOW_NAMESPACE="${PROD_FLOW_NAMESPACE}"
            FLOW_DIR="./kestra/flows-gke"
          fi

          echo "deploy_mode=${DEPLOY_MODE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "flow_namespace=${FLOW_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "flow_dir=${FLOW_DIR}" >> "$GITHUB_OUTPUT"

          echo "DEPLOY_MODE=${DEPLOY_MODE}"
          echo "IMAGE_TAG=${IMAGE_TAG}"
          echo "FLOW_NAMESPACE=${FLOW_NAMESPACE}"
          echo "FLOW_DIR=${FLOW_DIR}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      # Production Helm deployment only.
      # PRs must not upgrade Kestra infrastructure.
      - name: Install Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Check cluster access
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl get namespace ${KESTRA_NAMESPACE}
          kubectl get pods -n ${KESTRA_NAMESPACE}

      - name: Deploy or upgrade Kestra Helm release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          helm repo add kestra https://helm.kestra.io/
          helm repo update

          helm upgrade --install kestra kestra/kestra \
            --namespace ${KESTRA_NAMESPACE} \
            -f helm/kestra/values-gke.yaml \
            --wait \
            --timeout 15m

      - name: Wait for Kestra webserver
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl rollout status deployment/kestra-webserver \
            -n ${KESTRA_NAMESPACE} \
            --timeout=10m

      # PR preview flow generation.
      # This copies kestra/flows-gke to /tmp, rewrites namespace to crypto.preview.pr_N,
      # removes top-level triggers, and swaps Artifact Registry :latest images to :pr-N.
      - name: Generate PR preview Kestra flows
        if: github.event_name == 'pull_request' && steps.filter.outputs.kestra_flows == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --user pyyaml

          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import shutil
          import yaml

          source_root = pathlib.Path("kestra/flows-gke")
          target_root = pathlib.Path("${{ steps.meta.outputs.flow_dir }}")
          preview_namespace = "${{ steps.meta.outputs.flow_namespace }}"
          prod_namespace = os.environ["PROD_FLOW_NAMESPACE"]
          image_base = os.environ["IMAGE_BASE"]
          image_tag = "${{ steps.meta.outputs.image_tag }}"

          if target_root.exists():
              shutil.rmtree(target_root)
          target_root.mkdir(parents=True, exist_ok=True)

          def rewrite_object(obj):
              if isinstance(obj, dict):
                  for key, value in list(obj.items()):
                      if key == "namespace" and value == prod_namespace:
                          obj[key] = preview_namespace

                      if key in {"image", "containerImage"} and isinstance(value, str):
                          if value.startswith(image_base) and value.endswith(":latest"):
                              obj[key] = value[:-len(":latest")] + f":{image_tag}"

                      rewrite_object(value)

              elif isinstance(obj, list):
                  for item in obj:
                      rewrite_object(item)

          count = 0

          for src in sorted(source_root.rglob("*.yml")) + sorted(source_root.rglob("*.yaml")):
              rel = src.relative_to(source_root)
              dst = target_root / rel
              dst.parent.mkdir(parents=True, exist_ok=True)

              with src.open("r", encoding="utf-8") as f:
                  flow = yaml.safe_load(f)

              if not isinstance(flow, dict):
                  continue

              # Force preview namespace and disable automatic schedules/flow triggers.
              flow["namespace"] = preview_namespace
              flow.pop("triggers", None)

              labels = flow.get("labels")
              if not isinstance(labels, dict):
                  labels = {}
              labels["preview"] = "true"
              labels["preview.pr"] = "${{ github.event.pull_request.number }}"
              labels["preview.image_tag"] = image_tag
              flow["labels"] = labels

              rewrite_object(flow)

              with dst.open("w", encoding="utf-8") as f:
                  yaml.safe_dump(flow, f, sort_keys=False, allow_unicode=True)

              count += 1
              print(f"Generated preview flow: {dst}")

          print(f"Generated {count} preview flow file(s) in {target_root}")
          PY

          echo "Preview flow files:"
          find "${{ steps.meta.outputs.flow_dir }}" -type f -name '*.yml' -o -name '*.yaml'

      - name: Install kestractl
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/kestra-io/kestractl/main/install-scripts/install.sh | INSTALL_DIR='./' bash
          ./kestractl --help
          ./kestractl flows deploy --help

      # Keep port-forward, readiness check, auth check, and flow deploy in the same step.
      # This avoids losing the background kubectl port-forward between GitHub Actions steps.
      - name: Deploy Kestra flows through GKE port-forward
        if: steps.filter.outputs.kestra_flows == 'true'
        shell: bash
        env:
          KESTRACTL_USERNAME: ${{ secrets.KESTRA_BASIC_AUTH_USERNAME }}
          KESTRACTL_PASSWORD: ${{ secrets.KESTRA_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KESTRACTL_USERNAME:-}" ]; then
            echo "Missing required secret: KESTRA_BASIC_AUTH_USERNAME"
            exit 1
          fi

          if [ -z "${KESTRACTL_PASSWORD:-}" ]; then
            echo "Missing required secret: KESTRA_BASIC_AUTH_PASSWORD"
            exit 1
          fi

          echo "::group::Kestra cluster debug"
          kubectl -n "${KESTRA_NAMESPACE}" get pods -o wide || true
          kubectl -n "${KESTRA_NAMESPACE}" get svc -o wide || true
          kubectl -n "${KESTRA_NAMESPACE}" get endpoints || true
          echo "::endgroup::"

          kubectl -n "${KESTRA_NAMESPACE}" rollout status deployment/kestra-webserver --timeout=5m

          kubectl -n "${KESTRA_NAMESPACE}" port-forward deployment/kestra-webserver 8080:8080 > /tmp/kestra-port-forward.log 2>&1 &
          PF_PID=$!

          cleanup() {
            if kill -0 "${PF_PID}" 2>/dev/null; then
              kill "${PF_PID}" 2>/dev/null || true
              wait "${PF_PID}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          echo "Waiting for Kestra API on ${KESTRA_SERVER}..."
          KESTRA_READY="false"

          for i in $(seq 1 60); do
            if ! kill -0 "${PF_PID}" 2>/dev/null; then
              echo "kubectl port-forward exited before Kestra became reachable."
              echo "::group::port-forward log"
              cat /tmp/kestra-port-forward.log || true
              echo "::endgroup::"
              exit 1
            fi

            if curl -fsS \
              -u "${KESTRACTL_USERNAME}:${KESTRACTL_PASSWORD}" \
              "${KESTRA_SERVER}/" > /dev/null; then
              KESTRA_READY="true"
              break
            fi

            echo "Waiting for Kestra API... attempt ${i}/60"
            sleep 5
          done

          if [ "${KESTRA_READY}" != "true" ]; then
            echo "Kestra API did not become reachable at ${KESTRA_SERVER}."
            echo "::group::port-forward log"
            cat /tmp/kestra-port-forward.log || true
            echo "::endgroup::"
            echo "::group::Kestra debug after failure"
            kubectl -n "${KESTRA_NAMESPACE}" get pods -o wide || true
            kubectl -n "${KESTRA_NAMESPACE}" get svc -o wide || true
            kubectl -n "${KESTRA_NAMESPACE}" get endpoints || true
            echo "::endgroup::"
            exit 1
          fi

          echo "Kestra API is reachable."

          echo "Deploying Kestra flows..."
          echo "Mode: ${{ steps.meta.outputs.deploy_mode }}"
          echo "Namespace: ${{ steps.meta.outputs.flow_namespace }}"
          echo "Directory: ${{ steps.meta.outputs.flow_dir }}"

          ./kestractl flows deploy "${{ steps.meta.outputs.flow_dir }}" \
            --host "${KESTRA_SERVER}" \
            --tenant main \
            --override

      - name: Comment PR Kestra preview namespace
        if: github.event_name == 'pull_request' && steps.filter.outputs.kestra_flows == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- crypto-kestra-preview-flows -->';
            const namespace = '${{ steps.meta.outputs.flow_namespace }}';
            const imageTag = '${{ steps.meta.outputs.image_tag }}';

            const body = `${marker}
            ## ✅ Kestra preview flows deployed

            Preview namespace:

            \`\`\`text
            ${namespace}
            \`\`\`

            Preview image tag:

            \`\`\`text
            ${imageTag}
            \`\`\`

            These preview flows have:
            - top-level triggers removed
            - namespace rewritten from \`${{ env.PROD_FLOW_NAMESPACE }}\` to \`${namespace}\`
            - Artifact Registry \`:latest\` images rewritten to \`:${imageTag}\`

            Recommended manual tests in Kestra UI:
            \`\`\`text
            ${namespace}.the_pr_raw_hourly_test_gke
            ${namespace}.the_pr_dbt_test_gke
            ${namespace}.the_pr_ml_predict_test_gke
            ${namespace}.the_pr_quality_monitoring_test_gke
            \`\`\`

            Do not manually run full production-like flows unless you confirm they are side-effect safe.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const previous = comments.data.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
