name: Deploy Kestra to GKE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: project-lambda-crypto
  REGION: asia-southeast1
  CLUSTER_NAME: crypto-kestra-autopilot
  KESTRA_NAMESPACE: kestra
  KESTRA_SERVER: http://127.0.0.1:8080
  PROD_FLOW_NAMESPACE: crypto.data_engineering
  IMAGE_BASE: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker

on:
  push:
    branches:
      - main
    paths:
      - "helm/kestra/**"
      - "k8s/kestra/**"
      - "kestra/flows-gke/**"
      - ".github/workflows/kestra-deploy-gke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kestra/flows-gke/**"
      - ".github/workflows/kestra-deploy-gke.yml"
  workflow_dispatch:

jobs:
  deploy-kestra:
    name: Deploy Kestra Helm and flows
    runs-on: ubuntu-latest

    # Never grant cloud credentials to fork PRs.
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            helm_infra:
              - 'helm/kestra/**'
              - 'k8s/kestra/**'
              - '.github/workflows/kestra-deploy-gke.yml'
            kestra_flows:
              - 'kestra/flows-gke/**'
              - '.github/workflows/kestra-deploy-gke.yml'

      - name: Compute deploy metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IMAGE_TAG="pr-${PR_NUMBER}"
            DEPLOY_MODE="preview"
            FLOW_NAMESPACE="crypto.preview.pr_${PR_NUMBER}"
            FLOW_DIR="/tmp/kestra-preview-flows"
          else
            IMAGE_TAG="latest"
            DEPLOY_MODE="production"
            FLOW_NAMESPACE="${PROD_FLOW_NAMESPACE}"
            FLOW_DIR="./kestra/flows-gke"
          fi

          echo "deploy_mode=${DEPLOY_MODE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "flow_namespace=${FLOW_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "flow_dir=${FLOW_DIR}" >> "$GITHUB_OUTPUT"

          echo "DEPLOY_MODE=${DEPLOY_MODE}"
          echo "IMAGE_TAG=${IMAGE_TAG}"
          echo "FLOW_NAMESPACE=${FLOW_NAMESPACE}"
          echo "FLOW_DIR=${FLOW_DIR}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      # Production Helm deployment only.
      # PRs must not upgrade Kestra infrastructure.
      - name: Install Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Check cluster access
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl get namespace ${KESTRA_NAMESPACE}
          kubectl get pods -n ${KESTRA_NAMESPACE}

      - name: Deploy or upgrade Kestra Helm release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          helm repo add kestra https://helm.kestra.io/
          helm repo update

          helm upgrade --install kestra kestra/kestra \
            --namespace ${KESTRA_NAMESPACE} \
            -f helm/kestra/values-gke.yaml \
            --wait \
            --timeout 15m

      - name: Wait for Kestra webserver
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl rollout status deployment/kestra-webserver \
            -n ${KESTRA_NAMESPACE} \
            --timeout=10m

      # PR preview flow generation.
      # This copies kestra/flows-gke to /tmp, rewrites namespace to crypto.preview.pr_N,
      # removes top-level triggers, and swaps Artifact Registry :latest images to :pr-N.
      - name: Generate PR preview Kestra flows
        if: github.event_name == 'pull_request' && steps.filter.outputs.kestra_flows == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --user pyyaml

          python - <<'PY'
          from __future__ import annotations

          import os
          import pathlib
          import shutil
          import yaml

          source_root = pathlib.Path("kestra/flows-gke")
          target_root = pathlib.Path("${{ steps.meta.outputs.flow_dir }}")
          preview_namespace = "${{ steps.meta.outputs.flow_namespace }}"
          prod_namespace = os.environ["PROD_FLOW_NAMESPACE"]
          image_tag = "${{ steps.meta.outputs.image_tag }}"

          if target_root.exists():
              shutil.rmtree(target_root)
          target_root.mkdir(parents=True, exist_ok=True)

          def rewrite_object(obj):
              if isinstance(obj, dict):
                  for key, value in list(obj.items()):
                      # Rewrite production namespace to PR preview namespace.
                      if key == "namespace" and value == prod_namespace:
                          obj[key] = preview_namespace

                      # Kestra input type must be BOOL, not BOOLEAN.
                      if key == "type" and value == "BOOLEAN":
                          obj[key] = "BOOL"

                      # Rewrite Docker image tag from latest to pr-<number>.
                      if key in {"image", "containerImage"} and isinstance(value, str):
                          obj[key] = value.replace(":latest", f":{image_tag}")

                      rewrite_object(value)

              elif isinstance(obj, list):
                  for item in obj:
                      rewrite_object(item)

          count = 0

          for src in sorted(source_root.rglob("*.yml")) + sorted(source_root.rglob("*.yaml")):
              rel = src.relative_to(source_root)
              dst = target_root / rel
              dst.parent.mkdir(parents=True, exist_ok=True)

              with src.open("r", encoding="utf-8") as f:
                  flow = yaml.safe_load(f)

              if not isinstance(flow, dict):
                  continue

              # Force preview namespace.
              flow["namespace"] = preview_namespace

              # Preview flows must never auto-run.
              flow.pop("triggers", None)

              # IMPORTANT:
              # Remove labels from PR preview copies.
              # Some Kestra/kestractl versions fail when labels are serialized as arrays.
              # Labels are not required for preview deploy validation.
              flow.pop("labels", None)

              rewrite_object(flow)

              with dst.open("w", encoding="utf-8") as f:
                  yaml.safe_dump(flow, f, sort_keys=False, allow_unicode=True)

              count += 1
              print(f"Generated preview flow: {dst}")

          print(f"Generated {count} preview flow file(s) in {target_root}")
          PY

          echo "Preview flow files:"
          find "${{ steps.meta.outputs.flow_dir }}" \( -name '*.yml' -o -name '*.yaml' \) -type f -print

          echo "Checking generated preview files for invalid labels or BOOLEAN..."
          python - <<'PY'
          import pathlib
          import yaml
          import sys

          root = pathlib.Path("${{ steps.meta.outputs.flow_dir }}")
          failed = False

          for path in sorted(root.rglob("*.yml")) + sorted(root.rglob("*.yaml")):
              with path.open("r", encoding="utf-8") as f:
                  flow = yaml.safe_load(f)

              if not isinstance(flow, dict):
                  continue

              if "labels" in flow:
                  print(f"ERROR: preview file still has labels: {path}")
                  failed = True

              def scan(obj, current_path):
                  global_failed = False

                  if isinstance(obj, dict):
                      if obj.get("type") == "BOOLEAN":
                          print(f"ERROR: BOOLEAN type still exists in {path}: {current_path}")
                          global_failed = True

                      for key, value in obj.items():
                          if scan(value, f"{current_path}.{key}"):
                              global_failed = True

                  elif isinstance(obj, list):
                      for index, item in enumerate(obj):
                          if scan(item, f"{current_path}[{index}]"):
                              global_failed = True

                  return global_failed

              if scan(flow, "$"):
                  failed = True

          if failed:
              sys.exit(1)

          print("Generated preview files are clean: no labels, no BOOLEAN.")
          PY

      - name: Port-forward Kestra webserver
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          kubectl port-forward deployment/kestra-webserver 8080:8080 -n ${KESTRA_NAMESPACE} > /tmp/kestra-port-forward.log 2>&1 &
          echo $! > /tmp/kestra-port-forward.pid

          for i in $(seq 1 30); do
            if curl -fsS ${KESTRA_SERVER} > /dev/null; then
              echo "Kestra is reachable."
              exit 0
            fi
            echo "Waiting for Kestra..."
            sleep 5
          done

          echo "Kestra did not become reachable."
          cat /tmp/kestra-port-forward.log || true
          exit 1

      - name: Check Kestra webserver authentication
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          curl -fsS \
            -u "${{ secrets.KESTRA_BASIC_AUTH_USERNAME }}:${{ secrets.KESTRA_BASIC_AUTH_PASSWORD }}" \
            ${KESTRA_SERVER}/ > /dev/null

      - name: Deploy Kestra flows through REST API
        if: steps.filter.outputs.kestra_flows == 'true'
        shell: bash
        env:
          KESTRA_USERNAME: ${{ secrets.KESTRA_BASIC_AUTH_USERNAME }}
          KESTRA_PASSWORD: ${{ secrets.KESTRA_BASIC_AUTH_PASSWORD }}
          KESTRA_TENANT: main
          KESTRA_FLOW_DIR: ${{ steps.meta.outputs.flow_dir }}
        run: |
          set -euo pipefail

          echo "Deploying Kestra flows through REST API..."
          echo "Mode: ${{ steps.meta.outputs.deploy_mode }}"
          echo "Namespace: ${{ steps.meta.outputs.flow_namespace }}"
          echo "Directory: ${KESTRA_FLOW_DIR}"

          python -m pip install --user pyyaml
          python .github/scripts/deploy_kestra_flows.py
              if scan_invalid_boolean(flow):
                  print(f"ERROR {path}: contains invalid input type BOOLEAN. Use BOOL.")
                  return False

              body = source.encode("utf-8")

              ns_encoded = urllib.parse.quote(str(namespace), safe="")
              id_encoded = urllib.quote(str(flow_id), safe="")

              update_url = f"{KESTRA_SERVER}/api/v1/{TENANT}/flows/{ns_encoded}/{id_encoded}"
              create_url = f"{KESTRA_SERVER}/api/v1/{TENANT}/flows"

              # Try update first. If the flow does not exist or update endpoint is unavailable,
              # fallback to create.
              status, payload = request("PUT", update_url, body)

              if 200 <= status < 300:
                  print(f"UPDATED {namespace}.{flow_id}")
                  return True

              if status in {404, 405}:
                  status, payload = request("POST", create_url, body)

                  if 200 <= status < 300:
                      print(f"CREATED {namespace}.{flow_id}")
                      return True

              print(f"FAILED {namespace}.{flow_id} from {path}")
              print(f"HTTP status: {status}")
              print(payload[:2000])
              return False


          files = sorted(FLOW_DIR.rglob("*.yml")) + sorted(FLOW_DIR.rglob("*.yaml"))

          if not files:
              print(f"No flow files found in {FLOW_DIR}")
              sys.exit(1)

          failed = 0

          for path in files:
              ok = deploy_flow(path)
              if not ok:
                  failed += 1

          if failed:
              print(f"Deployment failed: {failed} flow(s) failed.")
              sys.exit(1)

          print(f"Deployment completed successfully: {len(files)} flow file(s).")
          PY