name: Deploy Kestra to GKE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: project-lambda-crypto
  REGION: asia-southeast1
  CLUSTER_NAME: crypto-kestra-autopilot
  KESTRA_NAMESPACE: kestra
  KESTRA_SERVER: http://127.0.0.1:8080

on:
  push:
    branches:
      - main
    paths:
      - "helm/kestra/**"
      - "k8s/kestra/**"
      - "kestra/flows-gke/**"
      - ".github/workflows/kestra-deploy-gke.yml"
  workflow_dispatch:

jobs:
  deploy-kestra:
    name: Deploy Kestra Helm and flows
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            helm_infra:
              - 'helm/kestra/**'
              - 'k8s/kestra/**'
              - '.github/workflows/kestra-deploy-gke.yml'
            kestra_flows:
              - 'kestra/flows-gke/**'
              - '.github/workflows/kestra-deploy-gke.yml'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      # Case 1: INFRASTRUCTURE DEPLOYMENT (Run only if you modify the helm/ or k8s/ directory)
      - name: Install Helm
        if: steps.filter.outputs.helm_infra == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      # Check if the K8s is working properly.
      - name: Check cluster access
        if: steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl get namespace ${KESTRA_NAMESPACE}
          kubectl get pods -n ${KESTRA_NAMESPACE}

      # Load the Kestra chart repository, read your resources configuration file values-gke.yaml, and issue a system upgrade command in GKE.
      - name: Deploy or upgrade Kestra Helm release
        if: steps.filter.outputs.helm_infra == 'true'
        run: |
          helm repo add kestra https://helm.kestra.io/
          helm repo update

          helm upgrade --install kestra kestra/kestra \
            --namespace ${KESTRA_NAMESPACE} \
            -f helm/kestra/values-gke.yaml \
            --wait \
            --timeout 15m

      # Check if the Kestra webserver is ready.
      - name: Wait for Kestra webserver
        if: steps.filter.outputs.helm_infra == 'true'
        run: |
          kubectl rollout status deployment/kestra-webserver \
            -n ${KESTRA_NAMESPACE} \
            --timeout=10m

      # Case 2: DEPLOY DATA FLOW (Only run if the kestra/flows-gke/ directory has been modified)
      - name: Port-forward Kestra webserver
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          kubectl port-forward deployment/kestra-webserver 8080:8080 -n ${KESTRA_NAMESPACE} > /tmp/kestra-port-forward.log 2>&1 &
          echo $! > /tmp/kestra-port-forward.pid

          # Run a health check loop up to 30 times, with a 5-second interval between each check.
          for i in $(seq 1 30); do
            if curl -fsS ${KESTRA_SERVER} > /dev/null; then
              echo "Kestra is reachable."
              exit 0
            fi
            echo "Waiting for Kestra..."
            sleep 5
          done

          echo "Kestra did not become reachable."
          cat /tmp/kestra-port-forward.log || true
          exit 1

      - name: Check Kestra webserver authentication
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          curl -fsS \
            -u "${{ secrets.KESTRA_BASIC_AUTH_USERNAME }}:${{ secrets.KESTRA_BASIC_AUTH_PASSWORD }}" \
            ${KESTRA_SERVER}/ > /dev/null
      # Download and install the main Kestractl control toolkit.
      - name: Install kestractl
        if: steps.filter.outputs.kestra_flows == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/kestra-io/kestractl/main/install-scripts/install.sh | INSTALL_DIR='./' bash
          ./kestractl --help
          ./kestractl flows deploy --help

      - name: Deploy GKE-ready Kestra flows
        if: steps.filter.outputs.kestra_flows == 'true'
        env:
          KESTRACTL_USERNAME: ${{ secrets.KESTRA_BASIC_AUTH_USERNAME }}
          KESTRACTL_PASSWORD: ${{ secrets.KESTRA_BASIC_AUTH_PASSWORD }}
        run: |
          ./kestractl flows deploy ./kestra/flows-gke \
            --host "${KESTRA_SERVER}" \
            --tenant main \
            --override