apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: crypto-batch-secrets-gke
  namespace: kestra
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/project-lambda-crypto/secrets/kestra-tiingo-api-key/versions/latest"
        path: "TIINGO_API_KEY"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-coinalyze-api-key/versions/latest"
        path: "COINALYZE_API_KEY"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-coingecko-api-key/versions/latest"
        path: "COINGECKO_API_KEY"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-arkham-api-key/versions/latest"
        path: "ARKHAM_API_KEY"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-api-id/versions/latest"
        path: "API_ID"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-api-hash/versions/latest"
        path: "API_HASH"

      - resourceName: "projects/project-lambda-crypto/secrets/kestra-telegram-session-string/versions/latest"
        path: "TELEGRAM_SESSION_STRING"
