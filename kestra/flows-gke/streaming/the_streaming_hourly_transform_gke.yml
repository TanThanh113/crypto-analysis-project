id: the_streaming_hourly_transform_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE streaming hourly transform.
  Builds hourly streaming market features from candlestick_1min.
  This is the realtime inference input path.

# Enable after manual test passes.
# triggers:
#   - id: hourly_plus_5_minutes_gke
#     type: io.kestra.plugin.core.trigger.Schedule
#     cron: "5 * * * *"
#     timezone: UTC

tasks:
  - id: build_streaming_prediction_input
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-streaming-hourly-transform
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e

              cd /app/crypto_dbt

              echo "[streaming] Running dbt streaming hourly transform..."

              uv run dbt build \
                --select \
                  stg_streaming_candlestick_1min \
                  int_streaming_market_hourly \
                  mart_ml_prediction_input_hourly \
                  mart_ml_prediction_input_latest \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse

              echo "[streaming] Streaming hourly transform completed."
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
