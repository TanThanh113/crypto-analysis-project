id: the_intraday_shift_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE intraday raw snapshot.
  Runs all intraday extract and validation steps first.
  Upload starts only after all extract and validation steps pass.
  Uses Workload Identity and Secret Manager CSI.

# Enable after manual GKE test passes.
triggers:
  - id: intraday_schedule_gke
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 0,7,13,19 * * *"
    recoverMissedSchedules: NONE

tasks:
  - id: intraday_shift_atomic
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT25M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never

      containers:
        - name: intraday-shift
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-batch:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -eu

              cd /app
              mkdir -p output_data

              read_secret() {
                tr -d '\r\n' < "/var/secrets/$1"
              }

              require_files() {
                PATTERN="$1"
                LABEL="$2"

                COUNT=$(find output_data -type f -name "$PATTERN" | wc -l | tr -d ' ')

                if [ "$COUNT" = "0" ]; then
                  echo "[fatal] Missing required output for ${LABEL}: ${PATTERN}"
                  echo "[fatal] Current output_data files:"
                  find output_data -maxdepth 5 -type f -print || true
                  exit 1
                fi

                echo "[check] ${LABEL}: found ${COUNT} file(s)."
              }

              upload_iceberg() {
                DB="$1"
                TABLE="$2"
                PATTERN="$3"

                echo "[upload] ${DB}.${TABLE} from ${PATTERN}"

                ICEBERG_DB="${DB}" \
                ICEBERG_TABLE="${TABLE}" \
                FILE_PATTERN="${PATTERN}" \
                ICEBERG_PARTITION_COL=ingestion_time \
                uv run python /app/batch/iceberg_loader.py
              }

              echo "[intraday] Python path:"
              which python
              python --version

              echo "[intraday] UV check:"
              uv run python -c "import pandas, pyarrow; print('uv env ok')"

              export COINALYZE_API_KEY="$(read_secret COINALYZE_API_KEY)"
              export COINGECKO_API_KEY="$(read_secret COINGECKO_API_KEY)"
              export ARKHAM_API_KEY="$(read_secret ARKHAM_API_KEY)"
              export API_ID="$(read_secret API_ID)"
              export API_HASH="$(read_secret API_HASH)"
              export TELEGRAM_SESSION_STRING="$(read_secret TELEGRAM_SESSION_STRING)"

              test -n "${COINALYZE_API_KEY}"
              test -n "${COINGECKO_API_KEY}"
              test -n "${ARKHAM_API_KEY}"
              test -n "${API_ID}"
              test -n "${API_HASH}"
              test -n "${TELEGRAM_SESSION_STRING}"

              echo "[intraday] ===== PHASE 1: EXTRACT + ASSERT OUTPUT ====="

              echo "[intraday][reddit] Extracting..."
              uv run python /app/batch/reddit_sentiment.py --manager iceberg
              require_files "reddit_raw_*.parquet" "reddit raw"
              require_files "reddit_summary_*.parquet" "reddit summary"

              echo "[intraday][telegram] Extracting..."
              uv run python /app/batch/telegram_sentiment.py --manager iceberg
              require_files "telegram_raw_*.parquet" "telegram raw"
              require_files "telegram_summary_*.parquet" "telegram summary"

              echo "[intraday][exchange_reserve] Extracting..."
              uv run python /app/batch/exchange_reserves_collector.py --manager iceberg
              require_files "exchange_reserve_*.parquet" "exchange reserve"

              echo "[intraday] ===== PHASE 2: VALIDATE ALL ====="

              echo "[intraday][reddit_raw] Validating..."
              uv run python /app/batch/data_validator.py \
                --dataset reddit_raw \
                --file_pattern "reddit_raw_*.parquet"

              echo "[intraday][telegram_raw] Validating..."
              uv run python /app/batch/data_validator.py \
                --dataset telegram_raw \
                --file_pattern "telegram_raw_*.parquet"

              echo "[intraday][exchange_reserve] Validating..."
              uv run python /app/batch/data_validator.py \
                --dataset exchange_reserve \
                --file_pattern "exchange_reserve_*.parquet"

              echo "[intraday] All extract and validation checks passed. Starting uploads."

              echo "[intraday] ===== PHASE 3: UPLOAD ALL ====="

              upload_iceberg raw_crypto_batch reddit_sentiment_raw "reddit_raw_*.parquet"
              upload_iceberg summary_crypto_batch reddit_sentiment_summary "reddit_summary_*.parquet"

              upload_iceberg raw_crypto_batch telegram_sentiment_raw "telegram_raw_*.parquet"
              upload_iceberg summary_crypto_batch telegram_sentiment_summary "telegram_summary_*.parquet"

              upload_iceberg raw_crypto_batch exchange_reserve_raw "exchange_reserve_*.parquet"

              echo "[intraday] Intraday shift completed."
          env:
            - name: OUTPUT_DIR
              value: output_data
            - name: GX_PROGRESS_BARS
              value: "false"

            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: GCP_BUCKET_NAME
              value: crypto-raw-archive-unique-6451
            - name: GCP_LOCATION
              value: asia-southeast1

            - name: ICEBERG_WAREHOUSE
              value: bq://projects/project-lambda-crypto/locations/asia-southeast1
          volumeMounts:
            - name: gcp-secret-manager-secrets
              mountPath: /var/secrets
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              memory: "8Gi"

      volumes:
        - name: gcp-secret-manager-secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: crypto-batch-secrets-gke
