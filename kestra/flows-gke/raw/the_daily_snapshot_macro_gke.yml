id: the_daily_snapshot_macro_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE daily macro snapshot.
  Runs extract, validate, and Iceberg upload in one Kubernetes pod using Workload Identity.
  TIINGO_API_KEY is mounted from Google Secret Manager through the GKE Secret Manager CSI add-on.

# Enable after manual GKE test passes.
triggers:
  - id: daily_schedule_macro_gke
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 22 * * *"
    recoverMissedSchedules: NONE

tasks:
  - id: macro_snapshot
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT15M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never

      containers:
        - name: macro-snapshot
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-batch:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
          
              cd /app
              mkdir -p output_data
          
              echo "[macro] Python path:"
              which python
              python --version
          
              echo "[macro] UV check:"
              uv run python -c "import requests; print('requests ok')"
          
              export TIINGO_API_KEY="$(cat /var/secrets/TIINGO_API_KEY)"
              test -n "${TIINGO_API_KEY}"
          
              echo "[macro] Extracting Tiingo macro data..."
              uv run python /app/batch/tiingo_extractor.py --type macro --manager iceberg
          
              echo "[macro] Validating macro data..."
              uv run python /app/batch/data_validator.py \
                --dataset macro_indicators_raw \
                --file_pattern "tiingo_macro_raw_*.parquet"
          
              echo "[macro] Uploading macro data to Iceberg..."
              uv run python /app/batch/iceberg_loader.py
          
              echo "[macro] Daily macro snapshot completed."
          env:
            - name: OUTPUT_DIR
              value: output_data

            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: GCP_BUCKET_NAME
              value: crypto-raw-archive-unique-6451
            - name: GCP_LOCATION
              value: asia-southeast1

            - name: ICEBERG_WAREHOUSE
              value: bq://projects/project-lambda-crypto/locations/asia-southeast1
            - name: ICEBERG_DB
              value: raw_crypto_batch
            - name: ICEBERG_TABLE
              value: macro_indicators_raw
            - name: FILE_PATTERN
              value: tiingo_macro_raw_*.parquet
            - name: ICEBERG_PARTITION_COL
              value: ingestion_time
          volumeMounts:
            - name: gcp-secret-manager-secrets
              mountPath: /var/secrets
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"

      volumes:
        - name: gcp-secret-manager-secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: crypto-batch-secrets-gke
