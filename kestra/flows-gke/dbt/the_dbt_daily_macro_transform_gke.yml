id: the_dbt_daily_macro_transform_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE daily macro dbt transform after macro ingestion.
  Runs as a Kubernetes pod using Workload Identity.

# Enable after the_daily_snapshot_macro_gke is migrated and tested.
# triggers:
#   - id: after_daily_macro_gke
#     type: io.kestra.plugin.core.trigger.Flow
#     preconditions:
#       id: daily_macro_gke_success
#       flows:
#         - namespace: crypto.data_engineering
#           flowId: the_daily_snapshot_macro_gke
#           states: [SUCCESS]

tasks:
  - id: dbt_daily_macro_transform
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-daily-macro-transform
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/crypto_dbt

              uv run dbt build \
                --select \
                  int_macro_daily \
                  fact_crypto_features_hourly \
                  mart_dashboard_kpi_latest \
                  mart_dashboard_macro_etf_daily \
                  mart_dashboard_data_freshness \
                  mart_ml_features_hourly \
                  mart_ml_feature_quality_daily \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
