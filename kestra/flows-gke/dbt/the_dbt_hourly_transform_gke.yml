id: the_dbt_hourly_transform_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE hourly dbt transform after hourly snapshot ingestion.
  Builds hourly intermediate models, dashboard marts, and ML training features.

# Enable after the_hourly_snapshot_gke is migrated and tested.
triggers:
  - id: after_the_hourly_snapshot_gke
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: hourly_snapshot_gke_success
      flows:
        - namespace: crypto.data_engineering
          flowId: the_hourly_snapshot_gke
          states: [SUCCESS]

tasks:
  - id: dbt_hourly_transform
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-hourly-transform
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/crypto_dbt

              uv run dbt build \
                --select \
                  int_funding_hourly \
                  int_liquidation_bucket_hourly \
                  int_liquidation_hourly \
                  int_options_hourly \
                  int_stablecoin_hourly \
                  fact_crypto_features_hourly \
                  mart_dashboard_kpi_latest \
                  mart_dashboard_derivatives_risk_hourly \
                  mart_dashboard_liquidation_heatmap_hourly \
                  mart_dashboard_options_risk_hourly \
                  mart_dashboard_data_freshness \
                  mart_ml_features_hourly \
                  mart_ml_labels_hourly \
                  mart_ml_training_dataset_hourly \
                  mart_ml_feature_quality_daily \
                  mart_ml_label_distribution_daily \
                  mart_ml_naive_baseline_metrics \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              memory: "4Gi"
