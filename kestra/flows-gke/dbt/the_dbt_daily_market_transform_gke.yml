id: the_dbt_daily_market_transform_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE daily batch market transform after Binance historical data ingestion.
  Updates historical market data, dashboard marts, and ML training dataset.
  This is not the realtime inference path.

# Enable after the_daily_snapshot_binance_gke is migrated and tested.
# triggers:
#   - id: after_daily_binance_gke
#     type: io.kestra.plugin.core.trigger.Flow
#     preconditions:
#       id: daily_binance_gke_success
#       flows:
#         - namespace: crypto.data_engineering
#           flowId: the_daily_snapshot_binance_gke
#           states: [SUCCESS]

tasks:
  - id: dbt_daily_market_transform
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-daily-market-transform
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/crypto_dbt

              uv run dbt build \
                --select \
                  int_market_trades_hourly \
                  fact_crypto_features_hourly \
                  dim_symbols \
                  dim_exchanges \
                  dim_time \
                  mart_dashboard_kpi_latest \
                  mart_dashboard_market_overview_hourly \
                  mart_dashboard_ai_signal_hourly \
                  mart_dashboard_alerts_hourly \
                  mart_dashboard_data_freshness \
                  mart_ml_features_hourly \
                  mart_ml_labels_hourly \
                  mart_ml_training_dataset_hourly \
                  mart_ml_feature_quality_daily \
                  mart_ml_label_distribution_daily \
                  mart_ml_naive_baseline_metrics \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              memory: "4Gi"
