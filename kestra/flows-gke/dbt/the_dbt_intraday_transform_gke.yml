id: the_dbt_intraday_transform_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE intraday dbt transform after Reddit, Telegram, and exchange reserve ingestion.
  Runs as a Kubernetes pod using Workload Identity.

# Enable after the_intraday_shift_gke is migrated and tested.
triggers:
  - id: after_the_intraday_shift_gke
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: intraday_shift_gke_success
      flows:
        - namespace: crypto.data_engineering
          flowId: the_intraday_shift_gke
          states: [SUCCESS]

tasks:
  - id: dbt_intraday_transform
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-intraday-transform
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/crypto_dbt

              uv run dbt build \
                --select \
                  int_reddit_sentiment_hourly \
                  int_telegram_sentiment_hourly \
                  int_social_sentiment_hourly \
                  int_exchange_reserve_hourly \
                  fact_crypto_features_hourly \
                  mart_dashboard_kpi_latest \
                  mart_dashboard_social_sentiment_hourly \
                  mart_dashboard_exchange_risk_daily \
                  mart_dashboard_liquidity_risk_daily \
                  mart_dashboard_data_freshness \
                  mart_ml_features_hourly \
                  mart_ml_feature_quality_daily \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
