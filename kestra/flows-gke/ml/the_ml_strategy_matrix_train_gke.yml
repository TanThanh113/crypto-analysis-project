id: the_ml_strategy_matrix_train_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  Manual GKE ML training flow for strategy matrix, promotion gate, and optional MLflow Registry.
  This flow has no trigger and should be launched manually when you want to compare strategies.
  Prediction still uses GCS/local artifacts and latest_model.json; it does not load from MLflow Registry.

inputs:
  - id: model_choice
    type: STRING
    defaults: auto
    description: Legacy model choice used only when strategy_matrix=false and strategy is empty.

  - id: strategy
    type: STRING
    defaults: ""
    description: Optional single training strategy name. Leave empty when running the full matrix.

  - id: strategy_matrix
    type: BOOL
    defaults: true
    description: Train all configured strategies. Enabled by default for this manual flow.

  - id: artifact_storage
    type: STRING
    defaults: both
    description: Artifact storage mode passed to train_model.py.

  - id: artifact_gcs_uri
    type: STRING
    defaults: ""
    description: Optional explicit GCS artifact folder. Empty uses feature_list.yml/env defaults.

  - id: mlflow_tracking_uri
    type: STRING
    defaults: ""
    description: Optional external MLflow tracking URI.

  - id: mlflow_experiment_name
    type: STRING
    defaults: ""
    description: Optional MLflow experiment name.

  - id: mlflow_enable_model_registry
    type: BOOL
    defaults: false
    description: Enable optional MLflow Model Registry registration. Disabled by default.

  - id: mlflow_update_model_alias
    type: BOOL
    defaults: false
    description: Update MLflow model alias after successful accepted promotion. Disabled by default.

  - id: mlflow_registered_model_name
    type: STRING
    defaults: ""
    description: Optional MLflow registered model name. Empty falls back to model config.

  - id: mlflow_model_alias
    type: STRING
    defaults: champion
    description: MLflow model alias to update when alias updates are enabled.

  - id: mlflow_registry_fail_on_error
    type: BOOL
    defaults: false
    description: Fail training when optional registry update fails. Disabled by default.

  - id: ml_promotion_fail_on_reject
    type: BOOL
    defaults: false
    description: Fail training when promotion gate rejects candidate. Disabled by default.

  - id: enable_optuna
    type: BOOL
    defaults: false
    description: Enable optional Optuna tuning for selected LightGBM candidates. Disabled by default.

  - id: optuna_n_trials
    type: INT
    defaults: 20
    description: Number of Optuna trials when tuning is enabled.

  - id: optuna_timeout_seconds
    type: STRING
    defaults: ""
    description: Optional Optuna timeout in seconds. Leave empty for no timeout.

  - id: optuna_study_name
    type: STRING
    defaults: ""
    description: Optional Optuna study name.

  - id: optuna_storage_uri
    type: STRING
    defaults: ""
    description: Optional Optuna storage URI such as sqlite:///tmp/crypto_optuna.db.

  - id: optuna_metric
    type: STRING
    defaults: f1_macro
    description: Validation metric optimized by Optuna.

  - id: optuna_strategy
    type: STRING
    defaults: ""
    description: Optional strategy or model key to tune. Empty tunes selected LightGBM candidates.

  - id: optuna_fail_on_error
    type: BOOL
    defaults: false
    description: Fail training when optional Optuna tuning fails. Disabled by default.

tasks:
  - id: train_strategy_matrix
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: train-strategy-matrix
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-ml:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e

              echo "[train] Starting manual ML strategy training on GKE..."
              cd /app/ml

              if [ "{{ inputs.strategy_matrix }}" = "true" ] && [ -n "{{ inputs.strategy }}" ]; then
                echo "[train][ERROR] Use either strategy_matrix=true or strategy, not both."
                exit 1
              fi

              if [ -n "{{ inputs.mlflow_tracking_uri }}" ]; then
                export MLFLOW_TRACKING_URI="{{ inputs.mlflow_tracking_uri }}"
              fi

              if [ -n "{{ inputs.mlflow_experiment_name }}" ]; then
                export MLFLOW_EXPERIMENT_NAME="{{ inputs.mlflow_experiment_name }}"
              fi

              if [ "{{ inputs.mlflow_enable_model_registry }}" = "true" ]; then
                export MLFLOW_ENABLE_MODEL_REGISTRY=true

                if [ -n "{{ inputs.mlflow_registered_model_name }}" ]; then
                  export MLFLOW_REGISTERED_MODEL_NAME="{{ inputs.mlflow_registered_model_name }}"
                fi

                if [ -n "{{ inputs.mlflow_model_alias }}" ]; then
                  export MLFLOW_MODEL_ALIAS="{{ inputs.mlflow_model_alias }}"
                fi
              fi

              if [ "{{ inputs.mlflow_update_model_alias }}" = "true" ]; then
                export MLFLOW_UPDATE_MODEL_ALIAS=true
              fi

              if [ "{{ inputs.mlflow_registry_fail_on_error }}" = "true" ]; then
                export MLFLOW_REGISTRY_FAIL_ON_ERROR=true
              fi

              if [ "{{ inputs.ml_promotion_fail_on_reject }}" = "true" ]; then
                export ML_PROMOTION_FAIL_ON_REJECT=true
              fi

              TRAIN_ARGS="--config feature_list.yml --artifact-dir artifacts --model-choice {{ inputs.model_choice }} --artifact-storage {{ inputs.artifact_storage }}"

              if [ -n "{{ inputs.artifact_gcs_uri }}" ]; then
                TRAIN_ARGS="${TRAIN_ARGS} --artifact-gcs-uri {{ inputs.artifact_gcs_uri }}"
              fi

              if [ "{{ inputs.strategy_matrix }}" = "true" ]; then
                TRAIN_ARGS="${TRAIN_ARGS} --strategy-matrix"
              elif [ -n "{{ inputs.strategy }}" ]; then
                TRAIN_ARGS="${TRAIN_ARGS} --strategy {{ inputs.strategy }}"
              fi

              if [ "{{ inputs.enable_optuna }}" = "true" ]; then
                TRAIN_ARGS="${TRAIN_ARGS} --enable-optuna --optuna-n-trials {{ inputs.optuna_n_trials }} --optuna-metric {{ inputs.optuna_metric }}"

                if [ -n "{{ inputs.optuna_timeout_seconds }}" ]; then
                  TRAIN_ARGS="${TRAIN_ARGS} --optuna-timeout-seconds {{ inputs.optuna_timeout_seconds }}"
                fi

                if [ -n "{{ inputs.optuna_study_name }}" ]; then
                  TRAIN_ARGS="${TRAIN_ARGS} --optuna-study-name {{ inputs.optuna_study_name }}"
                fi

                if [ -n "{{ inputs.optuna_storage_uri }}" ]; then
                  TRAIN_ARGS="${TRAIN_ARGS} --optuna-storage-uri {{ inputs.optuna_storage_uri }}"
                fi

                if [ -n "{{ inputs.optuna_strategy }}" ]; then
                  TRAIN_ARGS="${TRAIN_ARGS} --optuna-strategy {{ inputs.optuna_strategy }}"
                fi

                if [ "{{ inputs.optuna_fail_on_error }}" = "true" ]; then
                  TRAIN_ARGS="${TRAIN_ARGS} --optuna-fail-on-error"
                fi
              fi

              echo "[train] Running: python train_model.py ${TRAIN_ARGS}"
              python train_model.py ${TRAIN_ARGS}

              echo "[train] Manual ML strategy training completed."
          env:
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: GCP_BUCKET_NAME
              value: crypto-raw-archive-unique-6451
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"

  - id: build_model_metrics_mart
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-build-model-metrics
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e

              echo "[dbt] Starting dbt model metrics build on GKE..."
              cd /app/crypto_dbt

              uv run dbt build \
                --select mart_ml_model_metrics \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse

              echo "[dbt] dbt model metrics build completed."
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
