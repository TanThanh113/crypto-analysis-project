id: the_ml_predict_hourly_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE hourly ML inference.
  Safe no-op when mart_ml_prediction_input_latest has 0 rows.
  Uses Workload Identity and downloads the latest model artifact from GCS.

inputs:
  - id: model_source
    type: STRING
    defaults: artifact
    description: Predict model source. Keep artifact for current production behavior.

  - id: mlflow_tracking_uri
    type: STRING
    defaults: ""
    description: Optional MLflow tracking URI for registry-based prediction.

  - id: mlflow_model_uri
    type: STRING
    defaults: ""
    description: Optional explicit MLflow model URI, for example models:/name@champion.

  - id: mlflow_registered_model_name
    type: STRING
    defaults: ""
    description: Optional MLflow registered model name for alias-based prediction.

  - id: mlflow_model_alias
    type: STRING
    defaults: champion
    description: MLflow model alias used when registry prediction is enabled.

  - id: registry_fallback_to_artifact
    type: BOOL
    defaults: true
    description: Fallback to latest_model.json artifact when registry loading fails.

  - id: registry_strict
    type: BOOL
    defaults: false
    description: Fail prediction if registry loading fails. Disabled by default.

# Enable only after streaming producer is running reliably.
triggers:
  - id: after_streaming_hourly_transform_gke
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: streaming_hourly_gke_success
      flows:
        - namespace: crypto.data_engineering
          flowId: the_streaming_hourly_transform_gke
          states: [SUCCESS]

tasks:
  - id: run_predict_latest_safe
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: ml-predict-latest
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-ml:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e

              cd /app/ml

              echo "[predict] Checking prediction input row count..."

              ROW_COUNT="$(python - <<'PY'
              import os
              from google.cloud import bigquery

              project_id = os.environ["GCP_PROJECT_ID"]
              dataset = os.environ["BQ_ANALYTICS_DATASET"]

              client = bigquery.Client(project=project_id)
              query = f"""
              SELECT COUNT(*) AS row_count
              FROM `{project_id}.{dataset}.mart_ml_prediction_input_latest`
              """
              rows = list(client.query(query).result())
              print(rows[0]["row_count"])
              PY
              )"

              echo "[predict] mart_ml_prediction_input_latest rows=${ROW_COUNT}"

              if [ "${ROW_COUNT}" = "0" ]; then
                echo "[predict] No prediction input rows. Skipping predict_latest.py safely."
                exit 0
              fi

              echo "[predict] Running predict_latest.py..."

              if [ -n "{{ inputs.mlflow_tracking_uri }}" ]; then
                export MLFLOW_TRACKING_URI="{{ inputs.mlflow_tracking_uri }}"
              fi

              PREDICT_ARGS="--config feature_list.yml --artifact-dir artifacts --model-source {{ inputs.model_source }}"

              if [ -n "{{ inputs.mlflow_model_uri }}" ]; then
                PREDICT_ARGS="${PREDICT_ARGS} --mlflow-model-uri {{ inputs.mlflow_model_uri }}"
              fi

              if [ -n "{{ inputs.mlflow_registered_model_name }}" ]; then
                PREDICT_ARGS="${PREDICT_ARGS} --mlflow-registered-model-name {{ inputs.mlflow_registered_model_name }}"
              fi

              if [ -n "{{ inputs.mlflow_model_alias }}" ]; then
                PREDICT_ARGS="${PREDICT_ARGS} --mlflow-model-alias {{ inputs.mlflow_model_alias }}"
              fi

              if [ "{{ inputs.registry_fallback_to_artifact }}" != "true" ]; then
                PREDICT_ARGS="${PREDICT_ARGS} --no-registry-fallback-to-artifact"
              fi

              if [ "{{ inputs.registry_strict }}" = "true" ]; then
                PREDICT_ARGS="${PREDICT_ARGS} --registry-strict"
              fi

              echo "[predict] Running: python predict_latest.py ${PREDICT_ARGS}"
              python predict_latest.py ${PREDICT_ARGS}

              echo "[predict] Prediction completed."
          env:
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: GCP_BUCKET_NAME
              value: crypto-raw-archive-unique-6451
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"

  - id: build_prediction_mart
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-build-prediction-mart
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e

              cd /app/crypto_dbt

              uv run dbt build \
                --select mart_ml_predictions_latest mart_dashboard_ai_signal_hourly mart_dashboard_kpi_latest \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse

              echo "[predict] Prediction marts refreshed."
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
