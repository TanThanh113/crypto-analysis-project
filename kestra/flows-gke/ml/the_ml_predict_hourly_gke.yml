id: the_ml_predict_hourly_gke
namespace: crypto.data_engineering

labels:
  system.readOnly: "true"

description: |
  GKE hourly ML prediction flow.
  Downloads latest model artifact from GCS and writes predictions to BigQuery.
  Keep trigger disabled until streaming produces rows in mart_ml_prediction_input_latest.

# triggers:
#   - id: hourly_prediction_schedule
#     type: io.kestra.plugin.core.trigger.Schedule
#     cron: "5 * * * *"
#     timezone: Asia/Ho_Chi_Minh
#     recoverMissedSchedules: NONE

tasks:
  - id: predict_latest
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: predict-latest
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-ml:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/ml

              echo "[predict] Checking prediction input row count..."

              ROW_COUNT=$(python - <<'PY'
              from google.cloud import bigquery

              project_id = "project-lambda-crypto"
              table_id = "project-lambda-crypto.dbt_quants_dev.mart_ml_prediction_input_latest"

              client = bigquery.Client(project=project_id)
              query = f"""
              SELECT COUNT(1) AS row_count
              FROM `{table_id}`
              """
              row = list(client.query(query).result())[0]
              print(row.row_count)
              PY
              )

              echo "[predict] Prediction input row count: ${ROW_COUNT}"

              if [ "${ROW_COUNT}" = "0" ]; then
                echo "[predict] No prediction input rows found. Skipping prediction safely."
                exit 0
              fi

              echo "[predict] Input rows found. Running prediction..."

              python predict_latest.py \
                --config feature_list.yml \
                --artifact-dir artifacts \
                --artifact-storage gcs

              echo "[predict] Prediction completed."
          env:
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: GCP_BUCKET_NAME
              value: crypto-raw-archive-unique-6451
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"

  - id: build_prediction_mart
    type: io.kestra.plugin.kubernetes.core.PodCreate
    namespace: kestra
    waitUntilRunning: PT10M
    spec:
      serviceAccountName: kestra
      restartPolicy: Never
      containers:
        - name: dbt-build-prediction-mart
          image: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              cd /app/crypto_dbt

              uv run dbt build \
                --select mart_ml_predictions_latest \
                --vars '{"enable_ml_outputs_marts": true}' \
                --no-partial-parse
          env:
            - name: DBT_TARGET
              value: gke
            - name: GCP_PROJECT_ID
              value: project-lambda-crypto
            - name: BQ_ANALYTICS_DATASET
              value: dbt_quants_dev
            - name: BQ_ML_OUTPUTS_DATASET
              value: ml_outputs
            - name: BQ_LOCATION
              value: asia-southeast1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
