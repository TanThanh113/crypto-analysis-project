id: the_dbt_daily_market_transform
namespace: crypto.data_engineering

description: |
  Daily batch market transform after Binance historical data ingestion.
  This updates complete historical market data, dashboard marts, and ML training dataset.
  It is not the realtime inference path.

triggers:
  - id: after_daily_binance
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: daily_binance_success
      flows:
        - namespace: crypto.data_engineering
          flowId: the_daily_snapshot_binance
          states: [ SUCCESS ]

tasks:
  - id: dbt_daily_market_transform
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      pullPolicy: ALWAYS
    containerImage: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
    inputFiles:
      gcp-key.json: "{{ secret('GCP_CREDS') }}"
    env:
      GOOGLE_APPLICATION_CREDENTIALS: "gcp-key.json"
      GCP_PROJECT_ID: "{{ secret('GCP_PROJECT_ID') }}"
      BQ_ANALYTICS_DATASET: dbt_quants_dev
      BQ_ML_OUTPUTS_DATASET: ml_outputs
      BQ_LOCATION: asia-southeast1
    commands:
      - cp gcp-key.json /app/crypto_dbt/gcp-key.json
      - cd /app/crypto_dbt
      - |
        uv run dbt build \
          --select \
            int_market_trades_hourly \
            fact_crypto_features_hourly \
            dim_symbols \
            dim_exchanges \
            dim_time \
            mart_dashboard_kpi_latest \
            mart_dashboard_market_overview_hourly \
            mart_dashboard_ai_signal_hourly \
            mart_dashboard_alerts_hourly \
            mart_dashboard_data_freshness \
            mart_ml_features_hourly \
            mart_ml_labels_hourly \
            mart_ml_training_dataset_hourly \
            mart_ml_feature_quality_daily \
            mart_ml_label_distribution_daily \
            mart_ml_naive_baseline_metrics \
          --no-partial-parse
