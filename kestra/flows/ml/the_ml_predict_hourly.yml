id: the_ml_predict_hourly
namespace: crypto.data_engineering

description: |
  Hourly ML inference.
  Runs after streaming hourly transform has built mart_ml_prediction_input_latest.

# triggers:
#   - id: after_streaming_hourly_transform
#     type: io.kestra.plugin.core.trigger.Flow
#     preconditions:
#       id: streaming_hourly_success
#       flows:
#         - namespace: crypto.data_engineering
#           flowId: the_streaming_hourly_transform
#           states: [ SUCCESS ]

tasks:
  - id: run_predict_latest
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      pullPolicy: ALWAYS
    containerImage: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-ml:latest
    inputFiles:
      gcp-key.json: "{{ secret('GCP_CREDS') }}"
    env:
      GOOGLE_APPLICATION_CREDENTIALS: "gcp-key.json"
      GCP_PROJECT_ID: "{{ secret('GCP_PROJECT_ID') }}"
      GCP_BUCKET_NAME: "{{ secret('GCP_BUCKET_NAME') }}"
      BQ_ANALYTICS_DATASET: dbt_quants_dev
      BQ_ML_OUTPUTS_DATASET: ml_outputs
      BQ_LOCATION: asia-southeast1
    commands:
      - cp gcp-key.json /app/ml/gcp-key.json
      - cd /app/ml
      - |
        python predict_latest.py \
          --config feature_list.yml \
          --artifact-dir artifacts \
          --artifact-storage gcs
        
  - id: build_prediction_mart
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
    containerImage: asia-southeast1-docker.pkg.dev/project-lambda-crypto/crypto-docker/crypto-dbt:latest
    inputFiles:
      gcp-key.json: "{{ secret('GCP_CREDS') }}"
    env:
      GOOGLE_APPLICATION_CREDENTIALS: "gcp-key.json"
      GCP_PROJECT_ID: "{{ secret('GCP_PROJECT_ID') }}"
      BQ_ANALYTICS_DATASET: dbt_quants_dev
      BQ_ML_OUTPUTS_DATASET: ml_outputs
      BQ_LOCATION: asia-southeast1
    commands:
      - cp gcp-key.json /app/crypto_dbt/gcp-key.json
      - cd /app/crypto_dbt
      - |
        uv run dbt build \
          --select mart_ml_predictions_latest \
          --vars '{"enable_ml_outputs_marts": true}' \
          --no-partial-parse
